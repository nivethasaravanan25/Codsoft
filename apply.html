<!DOCTYPE html>
<html>
<head>
  <title>Apply Job</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar dark-nav">
  <div class="logo">💼 Job Board</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="jobs.html">Browse Job</a>
  </div>
</nav>

<!-- HEADER -->
<div class="page-header">
  <h1>Apply for Job</h1>
  <p>Fill the form to apply</p>
</div>

<!-- FORM SECTION -->
<div class="apply-container">
  <form class="apply-form" onsubmit="applyJob(event)">

    <h2>Application Form</h2>

    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    <input type="text" id="resume" placeholder="Resume Link" required>

    <button type="submit">Submit Application</button>

  </form>
</div>

<div id="toast" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
